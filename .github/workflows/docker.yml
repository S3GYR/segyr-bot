name: SEGYR Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 LOGIN GHCR (PAT fiable)
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🧠 Metadata FIXÉ (tags FULL QUALIFIED)
      - name: Extract metadata
        id: meta
        run: |
          IMAGE=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::7}

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            TAGS="ghcr.io/$IMAGE:$VERSION,ghcr.io/$IMAGE:latest,ghcr.io/$IMAGE:sha-$SHORT_SHA"
          else
            TAGS="ghcr.io/$IMAGE:latest,ghcr.io/$IMAGE:sha-$SHORT_SHA"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      # 🚀 BUILD + PUSH (corrigé)
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max