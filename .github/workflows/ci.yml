name: SEGYR CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-e2e:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: "1"
      SEGYR_JWT_SECRET: "ci-jwt-secret"
      SEGYR_DB_PASSWORD: "ci-db-password"
      SEGYR_REDIS_ENABLED: "true"
      SEGYR_REDIS_URL: "redis://127.0.0.1:6379/0"
      SEGYR_LLM_MODEL: "ollama/mock"
      SEGYR_LLM_API_BASE: "http://127.0.0.1:11434"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests (pytest)
        run: python -m pytest -q tests

      - name: Run Redis E2E and enforce score >= 80
        shell: bash
        run: |
          set -euo pipefail

          # Mock LLM endpoint for deterministic CI runs (no external network).
          python - <<'PY' > mock_llm.log 2>&1 &
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer


          class Handler(BaseHTTPRequestHandler):
              def _send(self, payload):
                  data = json.dumps(payload).encode("utf-8")
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(data)))
                  self.end_headers()
                  self.wfile.write(data)

              def do_GET(self):
                  if self.path.endswith("/api/tags"):
                      self._send({"models": [{"name": "mock"}]})
                  else:
                      self._send({"status": "ok"})

              def do_POST(self):
                  length = int(self.headers.get("Content-Length", "0"))
                  if length:
                      _ = self.rfile.read(length)

                  if self.path.endswith("/v1/chat/completions") or self.path.endswith("/chat/completions"):
                      self._send(
                          {
                              "id": "chatcmpl-mock",
                              "object": "chat.completion",
                              "choices": [
                                  {
                                      "index": 0,
                                      "message": {"role": "assistant", "content": "Paris"},
                                      "finish_reason": "stop",
                                  }
                              ],
                              "usage": {
                                  "prompt_tokens": 10,
                                  "completion_tokens": 2,
                                  "total_tokens": 12,
                              },
                          }
                      )
                  else:
                      self._send(
                          {
                              "model": "mock",
                              "created_at": "2026-01-01T00:00:00Z",
                              "message": {"role": "assistant", "content": "Paris"},
                              "done": True,
                              "done_reason": "stop",
                          }
                      )

              def log_message(self, fmt, *args):
                  return


          HTTPServer(("127.0.0.1", 11434), Handler).serve_forever()
          PY
          MOCK_LLM_PID=$!

          # Start gateway used by run_redis_e2e.py (/health + /message on :8090).
          python -m segyr_bot.gateway > gateway.log 2>&1 &
          GATEWAY_PID=$!

          cleanup() {
            kill "$GATEWAY_PID" "$MOCK_LLM_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          echo "Waiting for gateway health..."
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:8090/health" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:8090/health" >/dev/null

          set +e
          python run_redis_e2e.py \
            --base-url "http://127.0.0.1:8090" \
            --settle-seconds 3 \
            --timeout 30 \
            --queue-wait-seconds 8 \
            --no-export > e2e_result.json
          E2E_EXIT=$?
          set -e

          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("e2e_result.json")
          if not p.exists() or not p.read_text(encoding="utf-8").strip():
              raise SystemExit("run_redis_e2e.py n'a produit aucun JSON")

          data = json.loads(p.read_text(encoding="utf-8"))
          score = int(data.get("score", 0) or 0)
          status = data.get("status", "unknown")

          print(f"E2E status={status} score={score}")
          if score < 80:
              raise SystemExit(f"E2E score trop faible: {score} < 80")
          PY

          echo "run_redis_e2e.py exit code: ${E2E_EXIT}"

  docker-build-and-smoke:
    runs-on: ubuntu-latest
    needs: test-and-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t segyr-bot:ci .

      - name: Smoke test container /health
        shell: bash
        run: |
          set -euo pipefail

          docker run -d --name segyr-api-ci \
            -p 8000:8000 \
            -e SEGYR_DB_PASSWORD=ci-db-password-strong \
            -e SEGYR_JWT_SECRET=ci-jwt-secret-strong-32chars \
            -e SEGYR_API_AUTH_TOKEN=ci-api-token-strong \
            -e SEGYR_DB_HOST=127.0.0.1 \
            -e SEGYR_DB_PORT=5432 \
            -e SEGYR_DB_NAME=segyrbot \
            -e SEGYR_DB_USER=segyr \
            -e SEGYR_REDIS_URL=redis://127.0.0.1:6379/0 \
            segyr-bot:ci

          cleanup() {
            docker logs segyr-api-ci >/tmp/segyr-api.log 2>&1 || true
            docker rm -f segyr-api-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:8000/health" >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS "http://127.0.0.1:8000/health"
