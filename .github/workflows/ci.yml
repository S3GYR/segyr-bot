name: SEGYR CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-e2e:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: "1"
      SEGYR_TEST_MODE: "true"
      SEGYR_JWT_SECRET: "ci-jwt-secret"
      SEGYR_DB_PASSWORD: "ci-db-password"
      SEGYR_API_AUTH_TOKEN: "ci-api-auth-token-1234"
      SEGYR_REDIS_ENABLED: "true"
      SEGYR_REDIS_URL: "redis://127.0.0.1:6379/0"
      SEGYR_LLM_MODEL: "ollama/mock"
      SEGYR_LLM_API_BASE: "http://127.0.0.1:11434"
      SEGYR_AUTO_REPAIR_ENABLED: "true"
      SEGYR_AUTO_REPAIR_MODE: "run"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Validate critical imports
        run: |
          python - <<'PY'
          import importlib
          for name in ("fastapi", "loguru", "psycopg", "bcrypt"):
              importlib.import_module(name)
          print("Critical imports OK")
          PY

      - name: Run unit tests (pytest)
        run: python -m pytest -q tests

      - name: Run Redis E2E and enforce score >= 80
        shell: bash
        run: |
          set -euo pipefail

          # Mock LLM
          python - <<'PY' > mock_llm.log 2>&1 &
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def _send(self, payload):
                  data = json.dumps(payload).encode("utf-8")
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(data)))
                  self.end_headers()
                  self.wfile.write(data)

              def do_GET(self):
                  self._send({"models": [{"name": "mock"}]})

              def do_POST(self):
                  self._send({
                      "choices": [{"message": {"content": "Paris"}}]
                  })

              def log_message(self, fmt, *args):
                  return

          HTTPServer(("127.0.0.1", 11434), Handler).serve_forever()
          PY
          MOCK_LLM_PID=$!

          # Start gateway
          python -m segyr_bot.gateway > gateway.log 2>&1 &
          GATEWAY_PID=$!

          cleanup() {
            kill "$GATEWAY_PID" "$MOCK_LLM_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          echo "Waiting for gateway..."
          for i in {1..30}; do
            if curl -s "http://localhost:8090/health" > /dev/null; then
              echo "Gateway ready"
              break
            fi
            sleep 2
          done

          curl -fsS "http://localhost:8090/health"

          echo "=== Gateway logs ==="
          tail -n 100 gateway.log || true

          python run_redis_e2e.py \
            --base-url "http://127.0.0.1:8090" \
            --settle-seconds 3 \
            --timeout 30 \
            --queue-wait-seconds 8 \
            --no-export > e2e_result.json

          python - <<'PY'
          import json
          data = json.load(open("e2e_result.json"))
          score = int(data.get("score", 0))
          print(f"E2E score={score}")
          if score < 80:
              raise SystemExit(f"Score trop faible: {score}")
          PY

  docker-build-and-smoke:
    runs-on: ubuntu-latest
    needs: test-and-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t segyr-bot:ci .

      - name: Run container
        run: |
          docker run -d --name segyr-api-ci \
            -p 8090:8090 \
            -e SEGYR_DB_PASSWORD=ci-db-password \
            -e SEGYR_JWT_SECRET=ci-jwt-secret \
            -e SEGYR_API_AUTH_TOKEN=ci-api-token \
            -e SEGYR_REDIS_URL=redis://127.0.0.1:6379/0 \
            segyr-bot:ci

      - name: Wait for API
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:8090/health" >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed"
          docker logs segyr-api-ci
          exit 1