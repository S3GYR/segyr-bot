name: SEGYR CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-e2e:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: "1"
      SEGYR_TEST_MODE: "true"
      SEGYR_JWT_SECRET: "ci-jwt-secret"
      SEGYR_DB_PASSWORD: "ci-db-password"
      SEGYR_API_AUTH_TOKEN: "ci-api-auth-token-1234"
      SEGYR_REDIS_ENABLED: "true"
      SEGYR_REDIS_URL: "redis://127.0.0.1:6379/0"
      SEGYR_LLM_MODEL: "ollama/mock"
      SEGYR_LLM_API_BASE: "http://127.0.0.1:11434"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q tests

      - name: Run E2E (FULL DEBUG)
        shell: bash
        run: |
          set -euo pipefail

          echo "=== START MOCK LLM ==="
          python - <<'PY' > mock_llm.log 2>&1 &
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json

          class H(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200); self.end_headers()
                  self.wfile.write(b'{"ok":true}')
              def do_POST(self):
                  self.send_response(200); self.end_headers()
                  self.wfile.write(b'{"choices":[{"message":{"content":"Paris"}}]}')
              def log_message(self, *args): pass

          HTTPServer(("127.0.0.1", 11434), H).serve_forever()
          PY

          echo "=== START GATEWAY ==="
          python -m segyr_bot.gateway > gateway.log 2>&1 &
          GATEWAY_PID=$!

          sleep 3

          echo "=== PROCESS CHECK ==="
          ps aux | grep segyr_bot || true

          echo "=== PORT CHECK ==="
          ss -tuln || true

          echo "=== WAIT FOR PORT ==="
          PORT=""
          for i in {1..60}; do
            if ss -tuln | grep ":8090"; then PORT=8090; break; fi
            if ss -tuln | grep ":8000"; then PORT=8000; break; fi
            sleep 2
          done

          if [ -z "$PORT" ]; then
            echo "❌ Aucun port ouvert"
            cat gateway.log || true
            exit 1
          fi

          echo "✅ PORT DETECTED: $PORT"

          echo "=== WAIT FOR HEALTH ==="
          for i in {1..60}; do
            if curl -s "http://127.0.0.1:$PORT/health" > /dev/null; then
              echo "Gateway READY"
              break
            fi
            sleep 2
          done

          echo "=== GATEWAY LOG ==="
          cat gateway.log || true

          curl -fsS "http://127.0.0.1:$PORT/health"

          python run_redis_e2e.py \
            --base-url "http://127.0.0.1:$PORT" \
            --settle-seconds 3 \
            --timeout 30 \
            --queue-wait-seconds 8 \
            --no-export > result.json

          python - <<'PY'
          import json
          d = json.load(open("result.json"))
          s = int(d.get("score", 0))
          print("Score:", s)
          assert s >= 80, f"Score trop faible: {s}"
          PY

  docker-build-and-smoke:
    runs-on: ubuntu-latest
    needs: test-and-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t segyr-bot:ci .

      - name: Run container
        run: |
          docker run -d --name segyr-api-ci \
            -p 8090:8090 \
            -e SEGYR_DB_PASSWORD=ci-db-password \
            -e SEGYR_JWT_SECRET=ci-jwt-secret \
            -e SEGYR_API_AUTH_TOKEN=ci-api-token \
            -e SEGYR_REDIS_URL=redis://127.0.0.1:6379/0 \
            segyr-bot:ci

      - name: Wait API
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8090/health; then
              echo "API READY"
              exit 0
            fi
            sleep 1
          done
          docker logs segyr-api-ci
          exit 1