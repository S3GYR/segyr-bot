name: SEGYR CI/CD Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: "1"
      SEGYR_TEST_MODE: "true"
      SEGYR_JWT_SECRET: "ci-jwt-secret"
      SEGYR_DB_PASSWORD: "ci-db-password"
      SEGYR_API_AUTH_TOKEN: "ci-api-auth-token-1234"
      SEGYR_REDIS_ENABLED: "true"
      SEGYR_REDIS_URL: "redis://127.0.0.1:6379/0"
      SEGYR_LLM_MODEL: "ollama/mock"
      SEGYR_LLM_API_BASE: "http://127.0.0.1:11434"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest -q tests

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.vars.outputs.image }}
      deploy_tag: ${{ steps.vars.outputs.deploy_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            tags="${image}:${version},${image}:latest"
            deploy_tag="${version}"
          else
            short_sha="${GITHUB_SHA::7}"
            tags="${image}:latest,${image}:sha-${short_sha}"
            deploy_tag="latest"
          fi

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "deploy_tag=${deploy_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/opt/segyr-bot"
            IMAGE="${{ needs.build-and-push.outputs.image }}:${{ needs.build-and-push.outputs.deploy_tag }}"

            cd "$APP_DIR"

            echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            cat > docker-compose.ci-deploy.override.yml <<EOF
            services:
              api:
                image: ${IMAGE}
              worker:
                image: ${IMAGE}
            EOF

            docker compose -f docker-compose.yml -f docker-compose.ci-deploy.override.yml pull api worker
            docker compose -f docker-compose.yml -f docker-compose.ci-deploy.override.yml up -d --remove-orphans api worker
            docker image prune -f
