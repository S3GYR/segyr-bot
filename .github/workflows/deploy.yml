name: SEGYR CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: "1"
      SEGYR_TEST_MODE: "true"
      SEGYR_JWT_SECRET: "ci-jwt-secret"
      SEGYR_DB_PASSWORD: "ci-db-password"
      SEGYR_API_AUTH_TOKEN: "ci-api-auth-token-1234"
      SEGYR_REDIS_ENABLED: "true"
      SEGYR_REDIS_URL: "redis://127.0.0.1:6379/0"
      SEGYR_LLM_MODEL: "ollama/mock"
      SEGYR_LLM_API_BASE: "http://127.0.0.1:11434"
      SEGYR_AUTO_REPAIR_ENABLED: "true"
      SEGYR_AUTO_REPAIR_MODE: "run"
      AUTO_REPAIR_ENABLED: "true"
      AUTO_REPAIR_MODE: "run"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Validate critical imports
        run: |
          python - <<'PY'
          import importlib
          for name in ("fastapi", "loguru", "psycopg", "bcrypt"):
              importlib.import_module(name)
          print("Critical imports OK")
          PY

      - name: Run tests
        run: python -m pytest -q tests

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: vars
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${repo}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ CORRECTION IMPORTANTE
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ BUILD + PUSH
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max