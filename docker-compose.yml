version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: segyr-api
    env_file:
      - .env
    environment:
      SEGYR_DB_HOST: ${SEGYR_DB_HOST:-postgres}
      SEGYR_DB_PORT: ${SEGYR_DB_PORT:-5432}
      SEGYR_DB_NAME: ${SEGYR_DB_NAME:-segyrbot}
      SEGYR_DB_USER: ${SEGYR_DB_USER:-segyr}
      SEGYR_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SEGYR_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SEGYR_TELEGRAM_BOT_TOKEN: ${TELEGRAM_TOKEN:-}
      SEGYR_API_AUTH_TOKEN: ${SEGYR_API_AUTH_TOKEN:-segyr-token}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./workspace:/app/workspace
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: segyr-postgres
    environment:
      POSTGRES_USER: ${SEGYR_DB_USER:-segyr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${SEGYR_DB_NAME:-segyrbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: segyr-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: segyr-worker
    env_file:
      - .env
    environment:
      SEGYR_DB_HOST: ${SEGYR_DB_HOST:-postgres}
      SEGYR_DB_PORT: ${SEGYR_DB_PORT:-5432}
      SEGYR_DB_NAME: ${SEGYR_DB_NAME:-segyrbot}
      SEGYR_DB_USER: ${SEGYR_DB_USER:-segyr}
      SEGYR_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SEGYR_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SEGYR_TELEGRAM_BOT_TOKEN: ${TELEGRAM_TOKEN:-}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./workspace:/app/workspace
    command: ["python", "-m", "modules.worker.worker"]

volumes:
  pgdata:
  redisdata:
