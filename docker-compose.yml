version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8090:8090"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    runtime: nvidia
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - segyr-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-server
    ports:
      - "3200:80"
    restart: unless-stopped
    networks:
      - segyr-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--protected-mode", "no"]
    restart: unless-stopped
    networks:
      - segyr-net

networks:
  segyr-net:
    driver: bridge
